<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="utf-8" />
    <title>Spacecraft Tool Box</title>
</head>
<body>
    <p>Current Available Data</p>
<div class="sector-grid">
<div id="Terminus" class="Sector">
    <button type="button" class="sector-toggle" aria-expanded="true">Hide</button>
    <p class="name">Terminus Systems (outdated)</p>
    <div class="sector-body"></div>
</div>
<div id="Threshold" class="Sector">
    <button type="button" class="sector-toggle" aria-expanded="true">Hide</button>
    <p class="name">Threshold Systems (outdated)</p>
    <div class="sector-body"></div>
</div>
<div id="Cairn" class="Sector">
    <button type="button" class="sector-toggle" aria-expanded="true">Hide</button>
    <p class="name">Cairn Systems (outdated)</p>
    <div class="sector-body"></div>
</div>
</div>
<div>
<select name="Resource" id="resourceSearchTarget"></select>
<button id="startResourceSearch">Resource Search</button>
<select name="Resource" id="depositSearchTarget"></select>
<button id="startDepositSearch">Deposit Search</button>
<p id="searchResult">There are 0 planets that contain your search</p>
<div>
    <p>Results</p>
    <div id="resultHolder"></div>
</div>
</div>
<script src="location_data.js"></script>
<script src="index.js"></script>
</body>
</html>
